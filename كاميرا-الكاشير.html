<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#020617">
<title>كاميرا الجوال - كاشير أوسكار</title>
<script src="firebase.js"></script>
<script src="oskar-core-fix.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;background:#020617;color:#fff;font-family:system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;overflow:hidden}.cam-page{position:fixed;inset:0;display:flex;flex-direction:column}.top{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(2,6,23,.88);border-bottom:1px solid rgba(255,255,255,.08);z-index:5}.top b{font-size:17px}.state{font-size:12px;color:#bbf7d0;font-weight:800}.view{position:relative;flex:1;display:flex;align-items:center;justify-content:center;background:#000}video,#reader{width:100%;height:100%;object-fit:cover}.frame{position:absolute;width:min(88vw,620px);height:min(58vh,430px);border:3px solid #409898;border-radius:24px;box-shadow:0 0 0 999px rgba(0,0,0,.25),0 0 28px rgba(34,197,94,.45);z-index:3;pointer-events:none}.line{position:absolute;left:8%;right:8%;height:3px;background:#409898;box-shadow:0 0 18px #409898;animation:scan .85s ease-in-out infinite}@keyframes scan{0%{top:16%}50%{top:84%}100%{top:16%}}.bottom{min-height:86px;padding:10px 14px 16px;background:rgba(2,6,23,.92);border-top:1px solid rgba(255,255,255,.08);z-index:5}.last{font-size:13px;color:#cbd5e1;word-break:break-all;line-height:1.6}.ok{color:#86efac;font-weight:900}.bad{color:#fecaca;font-weight:900}.btn{border:0;border-radius:14px;background:#ef4444;color:#fff;font-weight:900;padding:10px 14px}.flash{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-8px);background:#16a34a;color:#fff;border-radius:999px;padding:9px 15px;font-weight:950;z-index:20;opacity:0;transition:.12s ease;white-space:nowrap}.flash.show{opacity:1;transform:translateX(-50%) translateY(0)}.hint{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(2,6,23,.70);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:8px 12px;font-weight:800;color:#e2e8f0;z-index:4;white-space:nowrap;font-size:13px}
</style>
</head>
<body>
<div class="cam-page">
  <div class="top"><b>كاميرا الجوال</b><span class="state" id="state">تشغيل الكاميرا...</span></div>
  <div class="view"><video id="video" playsinline muted></video><div id="reader" style="display:none"></div><div class="frame"><div class="line"></div></div><div class="hint">وجه الكاميرا نحو الباركود</div></div>
  <div class="bottom"><div id="last" class="last">جاهز للمسح</div></div>
</div>
<div id="flash" class="flash">تم الالتقاط</div>
<script>
(function(){
  var APP_KEY='supermarket_pos_ar_v1';
  var QUEUE_KEY='mobileBarcodeQueue';
  var DEFAULT_COMPANY_KEY='momen-5a28a';
  var params = new URLSearchParams(location.search);
  var COMPANY_KEY = params.get('k') || DEFAULT_COMPANY_KEY;
  var lastValue='', lastTime=0, dbReady=null, stream=null, detector=null, running=false, pushing=false, pending=[];
  var video=document.getElementById('video'), state=document.getElementById('state'), last=document.getElementById('last'), flash=document.getElementById('flash');
  function setState(t, cls){ state.textContent=t; state.className='state '+(cls||''); }
  function setLast(t, cls){ last.textContent=t; last.className='last '+(cls||''); }
  function beep(){try{var C=window.AudioContext||window.webkitAudioContext,ctx=new C(),o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=1175;o.type='sine';g.gain.value=.07;o.connect(g);g.connect(ctx.destination);o.start();setTimeout(function(){try{o.stop();ctx.close()}catch(e){}},65)}catch(e){}}
  function showFlash(txt){flash.textContent=txt||'تم الالتقاط';flash.classList.add('show');clearTimeout(flash._t);flash._t=setTimeout(function(){flash.classList.remove('show')},520)}
  function uid(){return 'mb-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,9)}
  function getDB(){try{return JSON.parse(localStorage.getItem(APP_KEY)||'{}')}catch(e){return {}}}
  function saveDB(d){try{localStorage.setItem(APP_KEY,JSON.stringify(d||{}))}catch(e){}}
  function ensureKey(d){d=d||getDB();d.settings=d.settings||{};d.settings.companyKey=d.settings.companyKey||COMPANY_KEY;return d}
  async function initDB(){
    var d=ensureKey(getDB()); saveDB(d);
    if(navigator.onLine&&window.FirebaseBridge&&typeof FirebaseBridge.sync==='function'){
      try{d=await FirebaseBridge.sync(d,{companyKey:COMPANY_KEY,silent:true,background:true,noRender:true});d=ensureKey(d);saveDB(d);setState('متصل');return d}catch(e){console.warn(e)}
    }
    setState('محلي فقط','bad'); return d;
  }
  async function pushDB(d){
    d=ensureKey(d||getDB()); saveDB(d);
    if(navigator.onLine&&window.FirebaseBridge){
      try{
        if(typeof FirebaseBridge.pushWithKey==='function') await FirebaseBridge.pushWithKey(COMPANY_KEY,{silent:true,background:true,noRender:true});
        else if(typeof FirebaseBridge.sync==='function'){d=await FirebaseBridge.sync(d,{companyKey:COMPANY_KEY,silent:true,background:true,noRender:true});saveDB(ensureKey(d));}
        setState('تم الإرسال','ok'); return true;
      }catch(e){console.warn(e)}
    }
    setState('لم يتم الإرسال','bad'); return false;
  }
  async function enqueueBarcode(code){
    code=String(code||'').trim(); if(!code) return;
    pending.push(code); if(pushing) return; pushing=true;
    while(pending.length){
      var val=pending.shift();
      var d=await (dbReady||Promise.resolve(ensureKey(getDB()))); d=ensureKey(d);
      d[QUEUE_KEY]=Array.isArray(d[QUEUE_KEY])?d[QUEUE_KEY]:[];
      d[QUEUE_KEY].push({id:uid(),barcode:val,companyKey:COMPANY_KEY,createdAt:new Date().toISOString(),status:'new',source:'mobile-camera'});
      d[QUEUE_KEY]=d[QUEUE_KEY].slice(-120); saveDB(d);
      var ok=await pushDB(d);
      setLast(ok ? ('تم إرسال الباركود: '+val) : ('التقطت الباركود ولم أستطع إرساله: '+val), ok?'ok':'bad');
    }
    pushing=false;
  }
  function onCode(code){
    code=String(code||'').trim(); if(!code) return;
    var now=Date.now(); if(code===lastValue && now-lastTime<900) return;
    lastValue=code; lastTime=now; beep(); showFlash('تم الالتقاط'); setLast('إرسال: '+code);
    enqueueBarcode(code);
  }
  async function startNative(){
    if(!('BarcodeDetector' in window) || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return false;
    try{
      detector=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39','code_93','itf','codabar','qr_code']});
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false});
      video.srcObject=stream; await video.play(); running=true; setState('الكاميرا تعمل','ok');
      loopDetect(); return true;
    }catch(e){console.warn(e);return false;}
  }
  async function loopDetect(){
    if(!running||!detector) return;
    try{var codes=await detector.detect(video); if(codes&&codes[0]) onCode(codes[0].rawValue||codes[0].displayValue||'');}catch(e){}
    requestAnimationFrame(loopDetect);
  }
  async function startHtml5(){
    video.style.display='none'; var reader=document.getElementById('reader'); reader.style.display='block';
    if(!window.Html5Qrcode){setState('تعذر تحميل القارئ','bad');setLast('افتح الصفحة من HTTPS وتأكد من الإنترنت لأول تشغيل','bad');return;}
    try{
      var qr=new Html5Qrcode('reader',{verbose:false});
      await qr.start({facingMode:'environment'},{fps:45,qrbox:function(w,h){var s=Math.floor(Math.min(w,h)*.88);return{width:s,height:Math.floor(s*.70)}},aspectRatio:1.777},function(decoded){onCode(decoded)},function(){});
      setState('الكاميرا تعمل','ok');
    }catch(e){console.warn(e);setState('الكاميرا مرفوضة','bad');setLast('اسمح بصلاحية الكاميرا وافتح الرابط عبر HTTPS','bad');}
  }
  async function start(){
    dbReady=initDB();
    var nativeOK=await startNative();
    if(!nativeOK) await startHtml5();
  }
  document.addEventListener('visibilitychange',function(){if(!document.hidden && !running && video.style.display!=='none') startNative();});
  start();
})();
</script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});</script>
</body>
</html>
