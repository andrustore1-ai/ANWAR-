<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#031713">
<title>كاميرا الكاشير</title>
<script src="firebase.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#031713;color:#fff;font-family:system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;min-height:100vh;direction:rtl}.page{min-height:100vh;padding:12px;display:flex;flex-direction:column;gap:10px}.head{display:flex;align-items:center;justify-content:space-between;gap:10px;background:linear-gradient(135deg,#064e3b,#0f9f6e);border:1px solid rgba(255,255,255,.16);border-radius:22px;padding:13px 14px;box-shadow:0 18px 50px rgba(0,0,0,.26)}.head b{display:block;font-size:20px;font-weight:950}.head span{display:block;color:#d7fff0;font-weight:850;font-size:12px;margin-top:2px}.dot{width:14px;height:14px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 7px rgba(34,197,94,.15)}.scan-wrap{position:relative;flex:1;min-height:360px;border:3px solid #22c55e;border-radius:26px;overflow:hidden;background:#000;box-shadow:0 22px 65px rgba(0,0,0,.34)}#video{width:100%;height:100%;object-fit:cover;display:none}#reader{width:100%;height:100%;min-height:360px}.line{position:absolute;left:18px;right:18px;top:18%;height:3px;background:#22c55e;box-shadow:0 0 20px #22c55e;animation:scan 1s ease-in-out infinite;z-index:5}@keyframes scan{0%{top:14%}50%{top:84%}100%{top:14%}}.status{background:#fff;color:#10251f;border-radius:22px;padding:13px 14px;font-weight:950;box-shadow:0 18px 50px rgba(0,0,0,.22)}.status small{display:block;color:#64748b;margin-top:4px;font-weight:800;direction:ltr;text-align:right}.last{background:#07251e;border:1px solid rgba(34,197,94,.24);border-radius:22px;padding:12px;max-height:170px;overflow:auto}.last h3{margin:0 0 8px;font-size:16px}.item{display:flex;justify-content:space-between;gap:10px;border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:9px;margin-bottom:7px}.item code{direction:ltr;color:#bbf7d0;font-weight:900}.item span{font-size:12px;color:#d1fae5}.err{color:#fecaca!important}.btn{border:0;border-radius:15px;padding:11px 14px;font-weight:950;background:#fff;color:#064e3b}.hint{text-align:center;color:#b7f7dc;font-weight:850;font-size:13px;padding:0 8px}@media(max-width:680px){.scan-wrap{min-height:66vh}#reader{min-height:66vh}.page{padding:9px}.head{border-radius:20px}.status,.last{border-radius:20px}}
</style>
</head>
<body>
<div class="page">
  <div class="head"><div><b>كاميرا الكاشير</b><span id="topStatus">فتح الكاميرا...</span></div><div class="dot"></div></div>
  <div class="scan-wrap"><video id="video" playsinline muted></video><div id="reader"></div><div class="line"></div></div>
  <div class="hint">امسح باركود المنتج فقط. لا يوجد بحث أو تعديل من الجوال.</div>
  <div class="status" id="status">جاهز للمسح<small id="subStatus">سيتم إرسال رقم الباركود كما هو إلى الكاشير.</small></div>
  <div class="last"><h3>آخر الباركودات</h3><div id="items"><div style="color:#9ca3af;font-weight:800">لا يوجد بعد</div></div></div>
</div>
<script>
(function(){
  var APP_KEY='supermarket_pos_ar_v1', ROOT='remoteFastScanner';
  var queue=[], flushing=false, hasPulled=false, nativeStream=null, html5=null, lastCode='', lastAt=0, count=0;
  function $(id){return document.getElementById(id)}
  function qs(k){return new URLSearchParams(location.search).get(k)||''}
  function now(){return new Date().toISOString()}
  function uid(){return 'fbs-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,9)}
  function getDB(){try{return JSON.parse(localStorage.getItem(APP_KEY)||'{}')||{}}catch(e){return {}}}
  function saveDB(d){try{localStorage.setItem(APP_KEY,JSON.stringify(d||{}))}catch(e){} return d}
  function companyKey(d){d=d||getDB(); d.settings=d.settings||{}; var key=qs('companyKey')||d.settings.companyKey||'MOMEN-BAC72'; d.settings.companyKey=key; return key}
  function root(d){d[ROOT]=d[ROOT]&&typeof d[ROOT]==='object'?d[ROOT]:{}; d[ROOT].events=Array.isArray(d[ROOT].events)?d[ROOT].events:[]; return d[ROOT]}
  function setStatus(a,b,bad){$('topStatus').textContent=a||''; $('status').innerHTML=(bad?'<span class="err">':'')+(a||'')+(bad?'</span>':'')+'<small id="subStatus">'+(b||'')+'</small>'}
  function beep(){try{if(navigator.vibrate)navigator.vibrate(55)}catch(e){} try{var C=window.AudioContext||window.webkitAudioContext;if(!C)return;var c=new C();if(c.state==='suspended')c.resume();var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=1040;g.gain.setValueAtTime(0.001,c.currentTime);g.gain.exponentialRampToValueAtTime(0.16,c.currentTime+0.012);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.115);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.13)}catch(e){}}
  function addItem(code,state){var box=$('items'); if(count===0)box.innerHTML=''; count++; var div=document.createElement('div'); div.className='item'; div.innerHTML='<code>'+String(code).replace(/[<>&]/g,'')+'</code><span>'+(state||'تم الالتقاط')+'</span>'; box.prepend(div); while(box.children.length>12) box.removeChild(box.lastChild)}
  async function bridgeSync(d){companyKey(d); saveDB(d); if(navigator.onLine && window.FirebaseBridge && typeof FirebaseBridge.sync==='function'){try{d=await FirebaseBridge.sync(d,{companyKey:companyKey(d),silent:true,background:true,noRender:true}); saveDB(d)}catch(e){console.warn(e)}} return getDB()}
  async function bridgePush(d){companyKey(d); saveDB(d); if(navigator.onLine && window.FirebaseBridge){try{if(typeof FirebaseBridge.pushWithKey==='function') await FirebaseBridge.pushWithKey(companyKey(d),{silent:true,background:true,noRender:true}); else await bridgeSync(d)}catch(e){console.warn(e)}}}
  function enqueue(code){var ev={id:uid(),code:String(code||'').trim(),status:'pending',source:'phone-camera-fast',createdAt:now(),companyKey:companyKey(getDB())}; queue.push(ev); addItem(ev.code,'قيد الإرسال'); flushQueue();}
  async function flushQueue(){if(flushing||!queue.length)return; flushing=true; try{var pending=queue.splice(0,queue.length); var d=getDB(); if(!hasPulled){d=await bridgeSync(d); hasPulled=true} var r=root(d); pending.forEach(function(ev){if(!r.events.some(function(x){return x.id===ev.id})) r.events.push(ev)}); if(r.events.length>650) r.events=r.events.slice(-650); saveDB(d); await bridgePush(d); setStatus('تم الإرسال للكاشير','آخر باركود: '+pending[pending.length-1].code,false)}catch(e){queue=pending.concat(queue); setStatus('تم الالتقاط لكن الإرسال ينتظر الاتصال','سيعاد الإرسال تلقائيًا',true)}finally{flushing=false}}
  function handleCode(code){code=String(code||'').trim(); if(!code)return; var t=Date.now(); if(code===lastCode && t-lastAt<700)return; lastCode=code; lastAt=t; beep(); setStatus('تم التقاط الباركود','الرقم: '+code,false); enqueue(code)}
  async function startNative(){if(!('BarcodeDetector' in window) || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw new Error('native unsupported'); var formats=[]; try{formats=await BarcodeDetector.getSupportedFormats()}catch(e){} var wanted=['ean_13','ean_8','upc_a','upc_e','code_128','code_39','code_93','itf','codabar','qr_code','data_matrix','pdf417']; var use=wanted.filter(function(x){return !formats.length || formats.indexOf(x)>-1}); var detector=new BarcodeDetector({formats:use}); nativeStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false}); var video=$('video'); $('reader').style.display='none'; video.style.display='block'; video.srcObject=nativeStream; await video.play(); setStatus('الكاميرا تعمل','وجه الكاميرا على باركود المنتج',false); var busy=false; async function loop(){if(!nativeStream)return; if(!busy && video.readyState>=2){busy=true; try{var codes=await detector.detect(video); if(codes&&codes.length) handleCode(codes[0].rawValue||codes[0].rawData||'')}catch(e){} busy=false} requestAnimationFrame(loop)} loop()}
  function startHtml5(){return new Promise(function(resolve,reject){if(!window.Html5Qrcode)return reject(new Error('html5-qrcode missing')); try{html5=new Html5Qrcode('reader',{verbose:false}); var fmts=[]; try{if(window.Html5QrcodeSupportedFormats) fmts=Object.keys(Html5QrcodeSupportedFormats).map(function(k){return Html5QrcodeSupportedFormats[k]}).filter(function(v){return typeof v==='number'})}catch(e){} html5.start({facingMode:'environment'},{fps:24,qrbox:function(w,h){return {width:Math.min(w-30,520),height:Math.min(260,h-30)}},aspectRatio:1.777,formatsToSupport:fmts},function(decoded){handleCode(decoded)},function(){}).then(function(){setStatus('الكاميرا تعمل','وجه الكاميرا على باركود المنتج',false);resolve()}).catch(reject)}catch(e){reject(e)}})}
  async function start(){companyKey(getDB()); setInterval(flushQueue,500); if(!window.isSecureContext && location.protocol!=='https:' && location.hostname!=='localhost' && location.hostname!=='127.0.0.1'){setStatus('الكاميرا تحتاج HTTPS','افتح الرابط من دومين HTTPS حتى تظهر صلاحية الكاميرا',true);return} try{await startNative()}catch(e){try{await startHtml5()}catch(err){setStatus('تعذر فتح الكاميرا','اسمح بالكاميرا من المتصفح وتأكد أن الرابط HTTPS',true); console.warn(err)}}}
  document.addEventListener('visibilitychange',function(){if(!document.hidden) flushQueue()});
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',start); else start();
})();
</script>
</body>
</html>
