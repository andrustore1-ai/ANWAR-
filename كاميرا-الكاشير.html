<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#031713">
<title>كاميرا الكاشير</title>
<script src="firebase.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#031713;color:#fff;font-family:system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;min-height:100vh;direction:rtl}.page{min-height:100vh;padding:10px;display:flex;flex-direction:column;gap:10px}.head{display:flex;align-items:center;justify-content:space-between;gap:10px;background:linear-gradient(135deg,#064e3b,#0f9f6e);border:1px solid rgba(255,255,255,.16);border-radius:22px;padding:13px 14px;box-shadow:0 18px 50px rgba(0,0,0,.26)}.head b{display:block;font-size:20px;font-weight:950}.head span{display:block;color:#d7fff0;font-size:12px;font-weight:800}.badge{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:7px 10px;font-weight:900;white-space:nowrap}.camera{position:relative;flex:1;min-height:420px;border-radius:26px;overflow:hidden;background:#000;border:1px solid rgba(255,255,255,.15);box-shadow:0 24px 70px rgba(0,0,0,.32)}video,#reader{width:100%;height:100%;object-fit:cover;display:block}.scan-frame{position:absolute;inset:17%;border:3px solid #22c55e;border-radius:22px;box-shadow:0 0 0 999px rgba(0,0,0,.18),0 0 28px rgba(34,197,94,.55);pointer-events:none}.scan-line{position:absolute;left:18%;right:18%;height:3px;background:#22c55e;box-shadow:0 0 15px #22c55e;animation:scan .78s ease-in-out infinite;pointer-events:none}@keyframes scan{0%{top:22%}50%{top:78%}100%{top:22%}}.status{border-radius:22px;padding:13px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);font-weight:900;line-height:1.7}.status small{display:block;color:#bdebdc;font-weight:800}.status.err{background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.35)}.last{display:grid;gap:7px;max-height:140px;overflow:auto}.item{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:9px 11px;font-weight:900;direction:ltr;text-align:left}.btn{border:0;border-radius:16px;padding:12px 16px;font-weight:950;background:#ef4444;color:#fff;font-family:inherit}@media(max-height:720px){.camera{min-height:330px}.scan-frame{inset:14%}}
</style>
</head>
<body>
<div class="page">
  <div class="head"><div><b>كاميرا الكاشير</b><span>مسح باركود فقط</span></div><div class="badge" id="count">0</div></div>
  <div class="camera"><video id="video" muted playsinline></video><div id="reader" style="display:none"></div><div class="scan-frame"></div><div class="scan-line"></div></div>
  <div class="status" id="status">جاري فتح الكاميرا...<small>اسمح للمتصفح باستخدام الكاميرا</small></div>
  <div class="last" id="last"></div>
  <button class="btn" onclick="location.reload()">إعادة فتح الكاميرا</button>
</div>
<script>
(function(){
  var APP_KEY='supermarket_pos_ar_v1';
  var ROOT='remoteFastScanner';
  var DIRECT_ROOT='oskarMobileBarcode';
  var queue=[];
  var sending=false;
  var pulled=false;
  var stream=null;
  var html5=null;
  var lastCode='';
  var lastAt=0;
  var total=0;

  function $(id){return document.getElementById(id)}
  function qs(n){try{return new URL(location.href).searchParams.get(n)||''}catch(e){return ''}}
  function uid(){return 'scan-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,9)}
  function now(){return new Date().toISOString()}
  function cleanKey(k){return String(k||'MOMEN-BAC72').replace(/[.#$\[\]\/]/g,'_')}
  function setStatus(a,b,err){var s=$('status');s.className='status'+(err?' err':'');s.innerHTML=a+'<small>'+(b||'')+'</small>'}
  function getDB(){try{return JSON.parse(localStorage.getItem(APP_KEY)||'{}')||{}}catch(e){return {}}}
  function saveDB(d){try{localStorage.setItem(APP_KEY,JSON.stringify(d||{}))}catch(e){} return d}
  function companyKey(d){d=d||getDB();d.settings=d.settings||{};var key=qs('companyKey')||d.settings.companyKey||localStorage.getItem('oskar_company_key')||'MOMEN-BAC72';d.settings.companyKey=key;try{localStorage.setItem('oskar_company_key',key)}catch(e){}saveDB(d);return key}
  function root(d){d[ROOT]=d[ROOT]&&typeof d[ROOT]==='object'?d[ROOT]:{};d[ROOT].events=Array.isArray(d[ROOT].events)?d[ROOT].events:[];return d[ROOT]}
  function beep(){try{if(navigator.vibrate)navigator.vibrate(35)}catch(e){}try{var C=window.AudioContext||window.webkitAudioContext;if(!C)return;var c=window.__beepCtx||(window.__beepCtx=new C());if(c.state==='suspended')c.resume();var o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=1120;g.gain.setValueAtTime(.001,c.currentTime);g.gain.exponentialRampToValueAtTime(.18,c.currentTime+.012);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.1);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.11)}catch(e){}}
  function addLast(code){total++;$('count').textContent=String(total);var x=document.createElement('div');x.className='item';x.textContent=code;$('last').prepend(x);while($('last').children.length>6)$('last').lastElementChild.remove()}

  function hasDirect(){return !!(window.firebase&&(typeof firebase.database==='function'||typeof firebase.firestore==='function'))}
  async function directSend(ev){
    if(!hasDirect())return false;
    var key=cleanKey(companyKey(getDB()));
    try{if(typeof firebase.database==='function'){await firebase.database().ref(DIRECT_ROOT+'/'+key+'/events/'+ev.id).set(ev);return true}}catch(e){console.warn(e)}
    try{if(typeof firebase.firestore==='function'){await firebase.firestore().collection(DIRECT_ROOT).doc(key).collection('events').doc(ev.id).set(ev);return true}}catch(e){console.warn(e)}
    return false;
  }
  async function bridgeSync(d){
    d=d||getDB();companyKey(d);saveDB(d);
    if(navigator.onLine&&window.FirebaseBridge&&typeof FirebaseBridge.sync==='function'){
      try{d=await FirebaseBridge.sync(d,{companyKey:companyKey(d),silent:true,noRender:true,background:true});saveDB(d);pulled=true}catch(e){console.warn(e)}
    }
    return getDB();
  }
  async function bridgePush(d){
    d=d||getDB();companyKey(d);saveDB(d);
    if(navigator.onLine&&window.FirebaseBridge){
      try{if(typeof FirebaseBridge.pushWithKey==='function')await FirebaseBridge.pushWithKey(companyKey(d));else await bridgeSync(d);return true}catch(e){console.warn(e)}
    }
    return false;
  }
  async function sendEvent(ev){
    if(await directSend(ev))return true;
    var d=getDB();
    if(!pulled)d=await bridgeSync(d);
    var r=root(d);
    if(!r.events.some(function(x){return x.id===ev.id}))r.events.push(ev);
    if(r.events.length>800)r.events=r.events.slice(-800);
    saveDB(d);
    return bridgePush(d);
  }
  async function flush(){
    if(sending||!queue.length)return;
    sending=true;
    try{
      while(queue.length){
        var ev=queue[0];
        var ok=await sendEvent(ev);
        if(!ok)break;
        queue.shift();
        setStatus('تم إرسال الباركود للكاشير','آخر رقم: '+ev.code,false);
      }
    }catch(e){console.warn(e);setStatus('تم الالتقاط وينتظر الاتصال','سيتم الإرسال تلقائيًا',true)}
    sending=false;
  }
  function handleCode(raw){
    var code=String(raw||'').trim();
    if(!code)return;
    var t=Date.now();
    if(code===lastCode&&t-lastAt<650)return;
    lastCode=code;lastAt=t;
    beep();addLast(code);setStatus('تم التقاط الباركود','الرقم: '+code,false);
    queue.push({id:uid(),code:code,barcode:code,status:'pending',source:'phone-camera',createdAt:now(),companyKey:companyKey(getDB())});
    flush();
  }

  async function startNative(){
    if(!('BarcodeDetector' in window))throw new Error('no native detector');
    var formats=[];try{formats=await BarcodeDetector.getSupportedFormats()}catch(e){}
    var wanted=['ean_13','ean_8','code_128','code_39','code_93','codabar','itf','upc_a','upc_e','qr_code'];
    var use=formats.length?wanted.filter(function(x){return formats.indexOf(x)>-1}):wanted;
    var detector=new BarcodeDetector({formats:use});
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false});
    var v=$('video');v.srcObject=stream;await v.play();setStatus('الكاميرا تعمل','وجه الكاميرا على باركود المنتج',false);
    var busy=false;
    async function loop(){
      if(!busy&&v.readyState>=2){
        busy=true;
        try{var list=await detector.detect(v);if(list&&list[0])handleCode(list[0].rawValue||list[0].rawData||'')}catch(e){}
        busy=false;
      }
      requestAnimationFrame(loop);
    }
    loop();
  }
  async function startHtml5(){
    if(!window.Html5Qrcode)throw new Error('html5-qrcode غير متاح');
    $('video').style.display='none';$('reader').style.display='block';
    html5=new Html5Qrcode('reader',{verbose:false});
    var formats=[];try{if(window.Html5QrcodeSupportedFormats)formats=Object.keys(Html5QrcodeSupportedFormats).map(function(k){return Html5QrcodeSupportedFormats[k]}).filter(function(x){return typeof x==='number'})}catch(e){}
    await html5.start({facingMode:'environment'},{fps:30,qrbox:function(w,h){return {width:Math.min(w-30,560),height:Math.min(300,h-30)}},aspectRatio:1.777,formatsToSupport:formats},function(decoded){handleCode(decoded)},function(){});
    setStatus('الكاميرا تعمل','وجه الكاميرا على باركود المنتج',false);
  }
  async function start(){
    companyKey(getDB());
    setInterval(flush,300);
    bridgeSync(getDB());
    if(!window.isSecureContext&&location.protocol!=='https:'&&location.hostname!=='localhost'&&location.hostname!=='127.0.0.1'){
      setStatus('الكاميرا تحتاج رابط آمن','افتح الصفحة من HTTPS حتى تظهر صلاحية الكاميرا',true);return;
    }
    try{await startNative()}catch(e){try{await startHtml5()}catch(err){console.warn(err);setStatus('تعذر فتح الكاميرا','اسمح بالكاميرا من المتصفح وتأكد أن الرابط HTTPS',true)}}
  }
  document.addEventListener('visibilitychange',function(){if(!document.hidden)flush()});
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',start);else start();
})();
</script>
</body>
</html>
