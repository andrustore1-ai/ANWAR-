<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التقارير والفواتير - R7 Burger</title>
  <style>
    :root{--brand:#ea580c;--dark:#101827;--muted:#6b7280;--line:#eef0f4;--bg:#f6f7fb;--ok:#16a34a;--bad:#dc2626;--shadow:0 18px 45px rgba(15,23,42,.08)}
    *{box-sizing:border-box} body{margin:0;background:#eef1f6;color:var(--dark);font-family:Tahoma,Arial,sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer;border:0}.app{max-width:1100px;min-height:100vh;margin:auto;background:#f8fafc}.top{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);padding:14px;display:flex;justify-content:space-between;align-items:center;gap:12px}.brand{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,#ea580c,#fb923c);color:#fff;display:grid;place-items:center;font-weight:900;font-size:20px}h1{font-size:21px;margin:0;font-weight:900}.sub{font-size:12px;color:var(--muted);font-weight:800;line-height:1.7}.nav{display:flex;gap:8px;overflow:auto;padding:12px 14px;background:#fff;border-bottom:1px solid var(--line)}.nav a,.nav button{white-space:nowrap;text-decoration:none;background:#fff7ed;color:#9a3412;padding:11px 14px;border-radius:16px;font-weight:900}.wrap{padding:16px;display:grid;gap:16px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:28px;padding:18px;box-shadow:var(--shadow)}.metric{background:#fff;border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:var(--shadow)}.metric b{font-size:26px;color:var(--brand)}.field{width:100%;border:1px solid var(--line);background:#f8fafc;border-radius:17px;padding:13px;margin:7px 0 12px;outline:none}.primary{border-radius:17px;padding:13px 16px;background:var(--brand);color:#fff;font-weight:900;box-shadow:0 8px 20px rgba(234,88,12,.18)}.secondary{border-radius:17px;padding:13px 16px;background:#111827;color:#fff;font-weight:900}.ghost{border-radius:14px;padding:10px 12px;background:#f3f4f6;color:#111827;font-weight:900}.danger{border-radius:14px;padding:10px 12px;background:#fee2e2;color:#991b1b;font-weight:900}.list{display:grid;gap:10px}.item{border:1px solid var(--line);border-radius:20px;padding:12px;background:#fff;display:grid;gap:8px}.row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.pill{border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;background:#f3f4f6;color:#475569}.receipt{direction:rtl;background:#fff;border:1px dashed #94a3b8;width:300px;max-width:100%;margin:auto;padding:12px;font-family:Tahoma,Arial,sans-serif;color:#000}.receipt h3{text-align:center;margin:0 0 8px}.receipt .line{border-top:1px dashed #000;margin:8px 0}.receipt table{width:100%;border-collapse:collapse;font-size:12px}.receipt td{padding:3px 0}.alert{padding:14px;border-radius:18px;margin-bottom:12px;font-weight:800;line-height:1.8;background:#fee2e2;color:#991b1b}.hidden{display:none}.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:100;max-width:600px;width:calc(100% - 34px);padding:16px 18px;border-radius:20px;background:#111827;color:#fff;font-weight:900;display:none;box-shadow:0 15px 40px rgba(15,23,42,.22);line-height:1.7}.toast.show{display:block}.toast.err{background:#b91c1c}.toast.ok{background:#047857}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}}@media(max-width:520px){.grid{grid-template-columns:1fr}.wrap{padding:12px}}@media print{body *{visibility:hidden}.receipt,.receipt *{visibility:visible}.receipt{position:absolute;top:0;right:0;left:0;width:72mm;border:0;margin:0;font-size:12px}}
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>
  <div class="app">
    <header class="top"><div class="brand"><div class="logo">R7</div><div><h1>التقارير والفواتير</h1><div class="sub">مبيعات، مصادر الطلبات، وفواتير حرارية</div></div></div><button id="refresh" class="secondary">تحديث</button></header>
    <nav class="nav"><a href="admin.html">الإدارة</a><a href="tables.html">الطاولات</a><a href="kitchen.html">المطبخ</a></nav>
    <main class="wrap">
      <div id="firebaseError" class="alert hidden"></div>
      <section class="card"><div class="grid2"><input id="fromDate" class="field" type="date"><input id="toDate" class="field" type="date"></div><button id="applyFilter" class="primary">تطبيق الفترة</button></section>
      <section class="grid"><div class="metric"><div class="sub">إجمالي المبيعات</div><b id="mSales">0</b></div><div class="metric"><div class="sub">عدد الطلبات</div><b id="mOrders">0</b></div><div class="metric"><div class="sub">طلبات الطاولات</div><b id="mTables">0</b></div><div class="metric"><div class="sub">طلبات واتساب</div><b id="mWhatsapp">0</b></div></section>
      <section class="grid2"><div class="card"><h2>أعلى الأصناف</h2><div id="topProducts" class="list"></div></div><div class="card"><h2>إنشاء طلب واتساب يدوي</h2><input id="manualName" class="field" placeholder="اسم الزبون"><input id="manualPhone" class="field" placeholder="رقم الزبون"><textarea id="manualItems" class="field" rows="5" placeholder="اكتب الطلب: برجر × 2\nكولا × 1"></textarea><input id="manualTotal" class="field" type="number" placeholder="الإجمالي"><button id="saveManual" class="primary">حفظ وإرسال واتساب</button></div></section>
      <section class="grid2"><div class="card"><h2>الطلبات</h2><div id="ordersList" class="list"></div></div><div class="card"><h2>فاتورة حرارية</h2><div id="receipt" class="receipt"><h3>R7 Burger</h3><div style="text-align:center">اختر طلباً لعرض الفاتورة</div></div><button id="printReceipt" class="secondary" style="width:100%;margin-top:12px">طباعة الفاتورة</button></div></section>
    </main>
  </div>
  <script type="module">
    import { requireAdmin, col, refDoc, addDoc, getDoc, getDocs, onSnapshot, serverTimestamp, firebaseErrorMessage, snapshotList, money, orderNo, FALLBACK_SETTINGS } from './firebase.js';
    if(!requireAdmin()) throw new Error('not logged');
    const $=id=>document.getElementById(id); const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const toast=(m,t='')=>{const e=$('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',3500)}; const showErr=m=>{$('firebaseError').textContent=m;$('firebaseError').classList.remove('hidden')};
    let orders=[], settings={...FALLBACK_SETTINGS}, selected=null;
    function stamp(o){ return Date.parse(o.createdAtText || '') || (o.createdAt?.seconds ? o.createdAt.seconds*1000 : Date.now()); }
    function filtered(){ const f=$('fromDate').value?new Date($('fromDate').value+'T00:00:00').getTime():0; const t=$('toDate').value?new Date($('toDate').value+'T23:59:59').getTime():Infinity; return orders.filter(o=>{const s=stamp(o);return s>=f&&s<=t&&o.status!=='cancelled'}); }
    function render(){ const list=filtered().sort((a,b)=>stamp(b)-stamp(a)); const total=list.reduce((a,o)=>a+Number(o.total||0),0); $('mSales').textContent=money(total,settings.currency); $('mOrders').textContent=list.length; $('mTables').textContent=list.filter(o=>o.table).length; $('mWhatsapp').textContent=list.filter(o=>o.source==='whatsapp').length; renderTop(list); renderOrders(list); if(selected) renderReceipt(selected); }
    function renderTop(list){ const map={}; list.forEach(o=>(o.items||[]).forEach(i=>{const k=i.name||'صنف'; map[k]=map[k]||{qty:0,total:0}; map[k].qty+=Number(i.qty||1); map[k].total+=Number(i.price||0)*Number(i.qty||1)})); const arr=Object.entries(map).sort((a,b)=>b[1].total-a[1].total).slice(0,8); $('topProducts').innerHTML=arr.map(([name,v])=>`<div class="item"><div class="row"><b>${esc(name)}</b><span class="pill">${v.qty} مبيعات</span></div><div class="sub">${money(v.total,settings.currency)}</div></div>`).join('')||'<div class="sub">لا توجد بيانات.</div>'; }
    function renderOrders(list){ $('ordersList').innerHTML=list.map(o=>`<div class="item"><div class="row"><b>${esc(o.no||o.id)}</b><span class="pill">${esc(o.status||'new')}</span></div><div class="sub">${o.table?'طاولة '+esc(o.table):'خارجي'} · ${new Date(stamp(o)).toLocaleString('ar')} · ${money(o.total,o.currency||settings.currency)}</div><div class="row"><button class="ghost" data-receipt="${esc(o.id)}">عرض الفاتورة</button></div></div>`).join('')||'<div class="sub">لا توجد طلبات.</div>'; document.querySelectorAll('[data-receipt]').forEach(b=>b.onclick=()=>{selected=orders.find(o=>o.id===b.dataset.receipt);renderReceipt(selected)}); }
    function renderReceipt(o){ if(!o)return; $('receipt').innerHTML=`<h3>${esc(settings.name||'R7 Burger')}</h3><div style="text-align:center">${esc(settings.slogan||'')}</div><div class="line"></div><div>رقم: ${esc(o.no||o.id)}</div><div>التاريخ: ${new Date(stamp(o)).toLocaleString('ar')}</div><div>${o.table?'طاولة: '+esc(o.table):'طلب خارجي'}</div><div class="line"></div><table>${(o.items||[]).map(i=>`<tr><td>${esc(i.name)} × ${Number(i.qty||1)}</td><td style="text-align:left">${money(Number(i.price||0)*Number(i.qty||1),o.currency||settings.currency)}</td></tr>`).join('')}</table>${o.note?`<div class="line"></div><div>ملاحظة: ${esc(o.note)}</div>`:''}<div class="line"></div><table><tr><td><b>الإجمالي</b></td><td style="text-align:left"><b>${money(o.total,o.currency||settings.currency)}</b></td></tr></table><div class="line"></div><div style="text-align:center">شكراً لزيارتكم</div>`; }
    $('printReceipt').onclick=()=>print(); $('applyFilter').onclick=render; $('refresh').onclick=()=>load();
    $('saveManual').onclick=async()=>{ const total=Number($('manualTotal').value||0); const items=$('manualItems').value.split('\n').map(x=>x.trim()).filter(Boolean).map(line=>({name:line,qty:1,price:0})); if(!items.length)return toast('اكتب الطلب','err'); const payload={no:orderNo(),source:'whatsapp',table:'',customerName:$('manualName').value.trim(),customerPhone:$('manualPhone').value.trim(),items,total,currency:settings.currency,status:'new',kitchenOpened:false,createdAt:serverTimestamp(),createdAtText:new Date().toISOString()}; try{await addDoc(col('orders'),payload); const phone=String($('manualPhone').value||settings.whatsapp||'').replace(/\D/g,''); const msg=`طلب ${payload.no}\n${$('manualItems').value}\nالإجمالي: ${money(total,settings.currency)}`; if(phone) window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank'); toast('تم حفظ الطلب','ok'); $('manualItems').value='';$('manualTotal').value='';}catch(e){showErr(firebaseErrorMessage(e));toast(firebaseErrorMessage(e),'err')} };
    async function load(){ try{ const s=await getDoc(refDoc('settings','main')); if(s.exists())settings={...settings,...s.data()}; orders=snapshotList(await getDocs(col('orders'))); render(); }catch(e){showErr(firebaseErrorMessage(e));} }
    try{ await load(); onSnapshot(col('orders'),snap=>{orders=snapshotList(snap);render()},e=>showErr(firebaseErrorMessage(e))); onSnapshot(refDoc('settings','main'),snap=>{if(snap.exists()){settings={...settings,...snap.data()};render()}},e=>showErr(firebaseErrorMessage(e))); }catch(e){showErr(firebaseErrorMessage(e));}
  </script>
</body>
</html>
