<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>شاشة المطبخ - R7 Burger</title>
  <style>
    :root{--brand:#ea580c;--dark:#101827;--muted:#6b7280;--line:#eef0f4;--bg:#f6f7fb;--ok:#16a34a;--bad:#dc2626;--warn:#f59e0b;--blue:#2563eb;--shadow:0 18px 45px rgba(15,23,42,.08)}
    *{box-sizing:border-box} body{margin:0;background:#eef1f6;color:var(--dark);font-family:Tahoma,Arial,sans-serif}button,select{font:inherit}button{cursor:pointer;border:0}.app{max-width:1100px;min-height:100vh;margin:auto;background:#f8fafc}.top{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);padding:14px;display:flex;justify-content:space-between;align-items:center;gap:12px}.brand{display:flex;align-items:center;gap:12px}.logo{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,#ea580c,#fb923c);color:#fff;display:grid;place-items:center;font-weight:900;font-size:20px}h1{font-size:21px;margin:0;font-weight:900}.sub{font-size:12px;color:var(--muted);font-weight:800}.notify{position:relative;width:58px;height:58px;border-radius:20px;background:#fff7ed;color:#ea580c;display:grid;place-items:center}.badge{position:absolute;top:-7px;right:-7px;background:#dc2626;color:#fff;min-width:26px;height:26px;border-radius:999px;display:grid;place-items:center;font-size:12px;font-weight:900;border:3px solid #fff}.nav{display:flex;gap:8px;overflow:auto;padding:12px 14px;background:#fff;border-bottom:1px solid var(--line)}.nav a,.nav button{white-space:nowrap;text-decoration:none;background:#fff7ed;color:#9a3412;padding:11px 14px;border-radius:16px;font-weight:900}.wrap{padding:16px}.filters{display:flex;gap:8px;overflow:auto;margin-bottom:14px}.filter{white-space:nowrap;background:#fff;border:1px solid var(--line);color:#475569;border-radius:16px;padding:11px 14px;font-weight:900}.filter.active{background:#111827;color:#fff}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}.order{background:#fff;border:1px solid var(--line);border-radius:28px;padding:16px;box-shadow:var(--shadow);display:grid;gap:12px}.order.new{border-color:#fdba74;box-shadow:0 18px 45px rgba(234,88,12,.13)}.order.preparing{border-color:#93c5fd}.order.ready{border-color:#86efac}.head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.no{font-size:20px;font-weight:900}.pill{border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900}.pill.new{background:#fff7ed;color:#9a3412}.pill.preparing{background:#dbeafe;color:#1d4ed8}.pill.ready{background:#dcfce7;color:#166534}.pill.completed{background:#f3f4f6;color:#475569}.pill.cancelled{background:#fee2e2;color:#991b1b}.items{display:grid;gap:8px}.item{display:flex;justify-content:space-between;background:#f8fafc;border-radius:15px;padding:10px;font-weight:800}.note{background:#fffbeb;color:#92400e;border-radius:16px;padding:10px;line-height:1.7;font-weight:800}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border-radius:14px;padding:10px 12px;font-weight:900}.primary{background:#ea580c;color:#fff}.blue{background:#2563eb;color:#fff}.ok{background:#16a34a;color:#fff}.danger{background:#fee2e2;color:#991b1b}.ghost{background:#f3f4f6;color:#111827}.alert{padding:14px;border-radius:18px;margin-bottom:12px;font-weight:800;line-height:1.8;background:#fee2e2;color:#991b1b}.hidden{display:none}.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:100;max-width:600px;width:calc(100% - 34px);padding:16px 18px;border-radius:20px;background:#111827;color:#fff;font-weight:900;display:none;box-shadow:0 15px 40px rgba(15,23,42,.22);line-height:1.7}.toast.show{display:block}.toast.err{background:#b91c1c}.toast.ok{background:#047857}svg{width:25px;height:25px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}@media(max-width:700px){.grid{grid-template-columns:1fr}.wrap{padding:12px}}
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>
  <div class="app">
    <header class="top"><div class="brand"><div class="logo">R7</div><div><h1>شاشة المطبخ</h1><div class="sub">الطلبات تظهر لحظياً من المنيو</div></div></div><button id="notifyBtn" class="notify"><svg viewBox="0 0 24 24"><path d="M10 5a2 2 0 0 1 4 0"/><path d="M5 17h14l-1.5-2.5V10a5.5 5.5 0 0 0-11 0v4.5L5 17Z"/><path d="M9 17a3 3 0 0 0 6 0"/></svg><span id="newCount" class="badge">0</span></button></header>
    <nav class="nav"><a href="admin.html">الإدارة</a><a href="tables.html">الطاولات</a><a href="reports.html">التقارير</a><button id="soundBtn">تشغيل تنبيه صوتي</button></nav>
    <main class="wrap"><div id="firebaseError" class="alert hidden"></div><div class="filters"><button class="filter active" data-filter="open">المفتوحة</button><button class="filter" data-filter="new">جديدة</button><button class="filter" data-filter="preparing">قيد التحضير</button><button class="filter" data-filter="ready">جاهزة</button><button class="filter" data-filter="all">الكل</button></div><section id="ordersGrid" class="grid"></section></main>
  </div>
  <script type="module">
    import { requireAdmin, col, refDoc, updateDoc, getDocs, onSnapshot, serverTimestamp, firebaseErrorMessage, snapshotList, money, FALLBACK_SETTINGS, getDoc } from './firebase.js';
    if(!requireAdmin()) throw new Error('not logged');
    const $=id=>document.getElementById(id); const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
    const toast=(m,t='')=>{const e=$('toast');e.textContent=m;e.className='toast show '+t;setTimeout(()=>e.className='toast',3500)}; const showErr=m=>{$('firebaseError').textContent=m;$('firebaseError').classList.remove('hidden')};
    let orders=[], filter='open', audioReady=false, lastNewIds=new Set(), settings={...FALLBACK_SETTINGS};
    const statusText={new:'جديد',preparing:'قيد التحضير',ready:'جاهز',completed:'مكتمل',cancelled:'ملغي'};
    document.querySelectorAll('.filter').forEach(b=>b.onclick=()=>{filter=b.dataset.filter;document.querySelectorAll('.filter').forEach(x=>x.classList.toggle('active',x===b));render()});
    $('soundBtn').onclick=()=>{audioReady=true;beep();toast('تم تفعيل التنبيه الصوتي','ok')};
    function beep(){ if(!audioReady) return; try{const ctx=new (window.AudioContext||window.webkitAudioContext)(); const osc=ctx.createOscillator(); const gain=ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value=880; gain.gain.value=.07; osc.start(); setTimeout(()=>{osc.stop();ctx.close()},180)}catch{} }
    function countNew(){ return orders.filter(o=>o.status==='new' && o.kitchenOpened!==true).length; }
    function filtered(){ return orders.filter(o=>{ if(filter==='all') return true; if(filter==='open') return !['completed','cancelled'].includes(o.status); return o.status===filter; }).sort((a,b)=>new Date(b.createdAtText||0)-new Date(a.createdAtText||0)); }
    function render(){
      $('newCount').textContent=countNew(); const list=filtered();
      $('ordersGrid').innerHTML=list.map(o=>`<article class="order ${esc(o.status||'new')}"><div class="head"><div><div class="no">${esc(o.no||o.id)}</div><div class="sub">${o.table?'طاولة '+esc(o.table):'طلب خارجي'} · ${new Date(o.createdAtText||Date.now()).toLocaleString('ar')}</div></div><span class="pill ${esc(o.status||'new')}">${statusText[o.status]||'جديد'}</span></div><div class="items">${(o.items||[]).map(i=>`<div class="item"><span>${esc(i.name)} × ${Number(i.qty||1)}</span><span>${money(Number(i.price||0)*Number(i.qty||1),o.currency||settings.currency)}</span></div>`).join('')}</div>${o.note?`<div class="note">${esc(o.note)}</div>`:''}<div class="sub">الإجمالي: <b>${money(o.total,o.currency||settings.currency)}</b> · المصدر: ${esc(o.source||'menu')}</div><div class="actions">${o.status==='new'?`<button class="btn primary" data-status="preparing" data-id="${esc(o.id)}">فتح / بدء التحضير</button>`:''}${o.status==='preparing'?`<button class="btn ok" data-status="ready" data-id="${esc(o.id)}">جاهز</button>`:''}${o.status==='ready'?`<button class="btn blue" data-status="completed" data-id="${esc(o.id)}">تسليم</button>`:''}<button class="btn danger" data-status="cancelled" data-id="${esc(o.id)}">إلغاء</button></div></article>`).join('')||'<div class="sub">لا توجد طلبات هنا.</div>';
      document.querySelectorAll('[data-status]').forEach(b=>b.onclick=()=>setStatus(b.dataset.id,b.dataset.status));
    }
    async function setStatus(id,status){ try{ await updateDoc(refDoc('orders',id),{status,kitchenOpened:true,updatedAt:serverTimestamp()}); toast('تم تحديث الطلب','ok'); }catch(e){showErr(firebaseErrorMessage(e));toast(firebaseErrorMessage(e),'err')} }
    try{ const s=await getDoc(refDoc('settings','main')); if(s.exists())settings={...settings,...s.data()}; const snap=await getDocs(col('orders')); orders=snapshotList(snap); lastNewIds=new Set(orders.filter(o=>o.status==='new'&&!o.kitchenOpened).map(o=>o.id)); render(); onSnapshot(col('orders'),snap=>{const next=snapshotList(snap); const newIds=new Set(next.filter(o=>o.status==='new'&&!o.kitchenOpened).map(o=>o.id)); for(const id of newIds){ if(!lastNewIds.has(id)) beep(); } lastNewIds=newIds; orders=next; render();},e=>showErr(firebaseErrorMessage(e))); }catch(e){showErr(firebaseErrorMessage(e));}
  </script>
</body>
</html>
