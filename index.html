<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R7 Burger - المنيو</title>
  <style>
    :root{--brand:#ea580c;--brand2:#fb923c;--dark:#101827;--muted:#6b7280;--line:#eef0f4;--bg:#f6f7fb;--ok:#16a34a;--bad:#dc2626;--warn:#f59e0b;--card:#fff;--shadow:0 18px 45px rgba(15,23,42,.08)}
    *{box-sizing:border-box} body{margin:0;background:#eef1f6;color:var(--dark);font-family:Tahoma,Arial,sans-serif} button,input,textarea,select{font:inherit} button{cursor:pointer;border:0} .app{max-width:480px;min-height:100vh;margin:auto;background:#fff;box-shadow:0 0 40px rgba(15,23,42,.12);position:relative;overflow:hidden}.header{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;padding:18px 18px;border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:12px}.logo{width:54px;height:54px;border-radius:19px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;display:grid;place-items:center;font-weight:900;font-size:22px;box-shadow:0 10px 25px rgba(234,88,12,.25)}h1{font-size:22px;margin:0 0 4px;font-weight:900}.sub{font-size:13px;color:var(--muted);font-weight:700}.iconBtn{width:54px;height:54px;border-radius:20px;background:#fff;color:var(--brand);display:grid;place-items:center;box-shadow:var(--shadow);position:relative}.badge{position:absolute;top:-6px;right:-6px;background:#dc2626;color:#fff;min-width:23px;height:23px;border-radius:999px;display:grid;place-items:center;font-size:12px;font-weight:900;border:3px solid #fff}.searchWrap{padding:18px;background:#fff}.search{width:100%;border:0;background:#f2f4f8;border-radius:28px;padding:18px 55px 18px 18px;outline:none;font-size:16px}.searchBox{position:relative}.searchIcon{position:absolute;right:20px;top:50%;transform:translateY(-50%);color:#9ca3af}.tablePill{display:inline-flex;align-items:center;gap:8px;background:#ecfdf5;color:#047857;padding:7px 12px;border-radius:999px;font-size:12px;font-weight:900;margin-top:8px}.notice{margin:0 18px 18px;padding:20px;border:1px solid #fed7aa;border-radius:28px;background:#fff7ed;color:#7c2d12;box-shadow:0 10px 30px rgba(251,146,60,.08)}.notice h3{margin:0 0 8px;font-size:20px}.notice p{margin:0;color:#6b7280;line-height:1.8;font-weight:700}.cats{position:sticky;top:91px;z-index:9;background:#fff;display:flex;gap:10px;padding:12px 18px;border-bottom:1px solid var(--line);overflow:auto}.cats::-webkit-scrollbar{display:none}.cat{white-space:nowrap;padding:12px 18px;border-radius:999px;background:#f3f4f6;color:#4b5563;font-weight:900}.cat.active{background:var(--brand);color:#fff;box-shadow:0 8px 22px rgba(234,88,12,.25)}.products{padding:18px 18px 135px;display:grid;gap:18px}.product{display:grid;grid-template-columns:130px 1fr;gap:16px;background:#fff;border:1px solid var(--line);border-radius:34px;overflow:hidden;box-shadow:var(--shadow)}.product img{width:130px;height:150px;object-fit:cover;background:#eef2f7}.pbody{padding:16px 0 16px 16px}.pbody h3{margin:0 0 8px;font-size:20px;font-weight:900}.pbody p{margin:0 0 14px;color:#6b7280;line-height:1.6;font-size:13px}.row{display:flex;align-items:center;justify-content:space-between;gap:10px}.price{font-size:20px;color:var(--brand);font-weight:900}.add{width:44px;height:44px;border-radius:16px;background:var(--brand);color:#fff;display:grid;place-items:center;box-shadow:0 10px 20px rgba(234,88,12,.23)}.bottomNav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:auto;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:14px 20px;display:flex;justify-content:space-around;z-index:15}.navItem{color:#94a3b8;background:transparent;font-weight:900;display:grid;gap:5px;place-items:center}.navItem.active{color:var(--brand);background:#fff7ed;border-radius:25px;padding:10px 20px}.modal{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:30;display:none;align-items:flex-end}.modal.show{display:flex}.sheet{max-width:480px;margin:auto;width:100%;background:#fff;border-radius:38px 38px 0 0;max-height:88vh;overflow:auto;padding:24px;animation:up .22s ease}.sheetHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.x{width:44px;height:44px;border-radius:16px;background:#f3f4f6;color:#111827}.cartLine{display:grid;grid-template-columns:70px 1fr auto;gap:12px;align-items:center;border:1px solid var(--line);border-radius:22px;padding:10px;margin-bottom:10px}.cartLine img{width:70px;height:70px;border-radius:18px;object-fit:cover}.small{font-size:12px;color:#6b7280}.qty{display:flex;align-items:center;gap:8px}.qty button{width:30px;height:30px;border-radius:11px;background:#f3f4f6;color:#111827;font-weight:900}.field{width:100%;border:1px solid var(--line);background:#f8fafc;border-radius:18px;padding:15px;margin:8px 0;outline:none}.primary{width:100%;border-radius:22px;padding:17px;background:var(--brand);color:#fff;font-weight:900;box-shadow:0 10px 25px rgba(234,88,12,.25)}.secondary{width:100%;border-radius:22px;padding:17px;background:#111827;color:#fff;font-weight:900}.empty{padding:50px 20px;text-align:center;color:#94a3b8;font-weight:900}.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:100;max-width:430px;width:calc(100% - 34px);padding:16px 18px;border-radius:20px;background:#111827;color:#fff;font-weight:900;display:none;box-shadow:0 15px 40px rgba(15,23,42,.22);line-height:1.7}.toast.show{display:block}.toast.err{background:#b91c1c}.toast.ok{background:#047857}.loader{padding:35px;text-align:center;color:#64748b;font-weight:900}.spin{width:34px;height:34px;border:4px solid #fed7aa;border-top-color:var(--brand);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}@keyframes spin{to{transform:rotate(360deg)}}@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}.errorBox{margin:18px;background:#fee2e2;color:#991b1b;border-radius:24px;padding:16px;font-weight:800;line-height:1.8}.okBox{margin:18px;background:#dcfce7;color:#166534;border-radius:24px;padding:16px;font-weight:800;line-height:1.8}@media(max-width:390px){.product{grid-template-columns:112px 1fr}.product img{width:112px}.pbody h3{font-size:18px}}
  </style>
</head>
<body>
  <div id="toast" class="toast"></div>
  <div class="app">
    <header class="header">
      <button id="cartBtnTop" class="iconBtn" aria-label="السلة">
        <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
        <span id="cartCount" class="badge">0</span>
      </button>
      <div class="brand">
        <div class="logo">R7</div>
        <div>
          <h1 id="storeName">R7 Burger</h1>
          <div id="storeSlogan" class="sub">نظام المنيو الذكي</div>
          <div id="tablePill" class="tablePill" style="display:none"></div>
        </div>
      </div>
      <button id="refreshBtn" class="iconBtn" aria-label="تحديث">
        <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-15.5 6.2"/><path d="M3 12a9 9 0 0 1 15.5-6.2"/><path d="M18 3v5h-5"/><path d="M6 21v-5h5"/></svg>
      </button>
    </header>

    <div id="firebaseWarning"></div>

    <section class="searchWrap">
      <div class="searchBox">
        <svg class="searchIcon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="searchInput" class="search" placeholder="ابحث عن وجبتك المفضلة..." />
      </div>
    </section>

    <section class="notice">
      <h3>طلب خارج المطعم</h3>
      <p>يمكنك تجهيز الطلب وإرساله واتساب، وسيتم حفظه في التقارير كمصدر واتساب.</p>
    </section>

    <nav id="cats" class="cats"></nav>
    <main id="products" class="products"><div class="loader"><div class="spin"></div>جاري تحميل المنيو...</div></main>

    <nav class="bottomNav">
      <button class="navItem active"><svg viewBox="0 0 24 24"><path d="m3 10 9-7 9 7"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg><span>المنيو</span></button>
      <button id="cartBtnBottom" class="navItem"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg><span>السلة</span></button>
    </nav>
  </div>

  <div id="cartModal" class="modal">
    <div class="sheet">
      <div class="sheetHead">
        <h2 style="margin:0;font-size:24px;font-weight:900">سلة الطلبات</h2>
        <button id="closeCart" class="x">×</button>
      </div>
      <div id="cartItems"></div>
      <div style="border-top:1px solid var(--line);padding-top:16px;margin-top:16px">
        <div class="row" style="font-size:22px;font-weight:900;margin-bottom:14px"><span>الإجمالي</span><span id="cartTotal">0</span></div>
        <input id="customerName" class="field" placeholder="الاسم - اختياري" />
        <input id="customerPhone" class="field" placeholder="رقم الجوال - اختياري" />
        <input id="tableInput" class="field" placeholder="رقم الطاولة" />
        <textarea id="orderNote" class="field" placeholder="ملاحظات على الطلب" rows="3"></textarea>
        <button id="sendKitchen" class="primary">إرسال الطلب للمطبخ</button>
        <button id="sendWhatsapp" class="secondary" style="margin-top:10px">إرسال الطلب واتساب</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { col, refDoc, addDoc, getDoc, getDocs, setDoc, onSnapshot, query, orderBy, serverTimestamp, firebaseErrorMessage, money, orderNo, FALLBACK_SETTINGS, FALLBACK_CATEGORIES, FALLBACK_PRODUCTS, snapshotList } from './firebase.js';

    let settings = {...FALLBACK_SETTINGS};
    let categories = [...FALLBACK_CATEGORIES];
    let products = [...FALLBACK_PRODUCTS];
    let selectedCat = 'all';
    let cart = JSON.parse(localStorage.getItem('r7_cart') || '[]');
    let unsubscribers = [];
    const params = new URLSearchParams(location.search);
    const tableNo = params.get('table') || params.get('t') || '';

    const $ = id => document.getElementById(id);
    const toast = (msg, type='') => { const el = $('toast'); el.textContent = msg; el.className = 'toast show ' + type; setTimeout(()=> el.className='toast', 4200); };
    const esc = s => String(s ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));

    if(tableNo){ $('tablePill').style.display='inline-flex'; $('tablePill').innerHTML = `<svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="8" rx="2"/><path d="M7 16v4M17 16v4M7 8V4M17 8V4"/></svg> طاولة رقم ${esc(tableNo)}`; $('tableInput').value = tableNo; $('tableInput').readOnly = true; }

    function updateHeader(){
      $('storeName').textContent = settings.name || 'R7 Burger';
      $('storeSlogan').textContent = settings.slogan || 'نظام المنيو الذكي';
    }

    function showFirebaseWarning(msg){
      $('firebaseWarning').innerHTML = msg ? `<div class="errorBox">${esc(msg)}</div>` : '';
    }

    function saveCart(){ localStorage.setItem('r7_cart', JSON.stringify(cart)); renderCartBadge(); }
    function renderCartBadge(){ $('cartCount').textContent = cart.reduce((a,i)=>a+Number(i.qty||1),0); }

    function renderCategories(){
      const activeCats = categories.filter(c => c.active !== false).sort((a,b)=>Number(a.sort||0)-Number(b.sort||0));
      $('cats').innerHTML = `<button class="cat ${selectedCat==='all'?'active':''}" data-cat="all">الكل</button>` + activeCats.map(c => `<button class="cat ${selectedCat===c.id?'active':''}" data-cat="${esc(c.id)}">${esc(c.name)}</button>`).join('');
      document.querySelectorAll('.cat').forEach(btn => btn.onclick = () => { selectedCat = btn.dataset.cat; renderCategories(); renderProducts(); });
    }

    function renderProducts(){
      const term = $('searchInput').value.trim().toLowerCase();
      const list = products.filter(p => p.active !== false)
        .filter(p => selectedCat === 'all' || p.categoryId === selectedCat)
        .filter(p => !term || String(p.name+' '+(p.description||'')).toLowerCase().includes(term))
        .sort((a,b)=>Number(a.sort||0)-Number(b.sort||0));
      if(!list.length){ $('products').innerHTML = '<div class="empty">لا توجد أصناف مطابقة.</div>'; return; }
      $('products').innerHTML = list.map(p => `
        <article class="product">
          <img src="${esc(p.image || 'https://images.unsplash.com/photo-1550547660-d9450f859349?w=900&h=700&fit=crop')}" onerror="this.src='https://images.unsplash.com/photo-1550547660-d9450f859349?w=900&h=700&fit=crop'" alt="">
          <div class="pbody">
            <h3>${esc(p.name)}</h3>
            <p>${esc(p.description || '')}</p>
            <div class="row">
              <span class="price">${money(p.price, settings.currency)}</span>
              <button class="add" data-add="${esc(p.id)}"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
            </div>
          </div>
        </article>`).join('');
      document.querySelectorAll('[data-add]').forEach(btn => btn.onclick = () => addToCart(btn.dataset.add));
    }

    function addToCart(id){
      const p = products.find(x => x.id === id); if(!p) return;
      const found = cart.find(i => i.id === id);
      if(found) found.qty = Number(found.qty||1) + 1;
      else cart.push({ id:p.id, name:p.name, price:Number(p.price||0), image:p.image||'', qty:1 });
      saveCart(); renderCart(); toast('تمت إضافة الصنف للسلة', 'ok');
    }

    function renderCart(){
      if(!cart.length){ $('cartItems').innerHTML = '<div class="empty">السلة فارغة</div>'; $('cartTotal').textContent = money(0, settings.currency); return; }
      $('cartItems').innerHTML = cart.map((i, idx) => `
        <div class="cartLine">
          <img src="${esc(i.image || 'https://images.unsplash.com/photo-1550547660-d9450f859349?w=300&h=300&fit=crop')}" alt="">
          <div><b>${esc(i.name)}</b><div class="small">${money(i.price, settings.currency)} × ${Number(i.qty||1)}</div></div>
          <div class="qty"><button data-minus="${idx}">-</button><b>${Number(i.qty||1)}</b><button data-plus="${idx}">+</button></div>
        </div>`).join('');
      document.querySelectorAll('[data-plus]').forEach(b => b.onclick = () => { cart[b.dataset.plus].qty++; saveCart(); renderCart(); });
      document.querySelectorAll('[data-minus]').forEach(b => b.onclick = () => { const x=cart[b.dataset.minus]; x.qty--; if(x.qty<=0) cart.splice(b.dataset.minus,1); saveCart(); renderCart(); });
      $('cartTotal').textContent = money(cartTotal(), settings.currency);
    }

    function cartTotal(){ return cart.reduce((a,i)=>a+Number(i.price||0)*Number(i.qty||1),0); }
    function openCart(){ renderCart(); $('cartModal').classList.add('show'); }
    function closeCart(){ $('cartModal').classList.remove('show'); }

    function orderPayload(source){
      return {
        no: orderNo(), source,
        table: $('tableInput').value.trim() || tableNo || '',
        customerName: $('customerName').value.trim(),
        customerPhone: $('customerPhone').value.trim(),
        note: $('orderNote').value.trim(),
        items: cart.map(i => ({ id:i.id, name:i.name, price:Number(i.price||0), qty:Number(i.qty||1) })),
        total: cartTotal(), currency: settings.currency || '₪',
        status: 'new', kitchenOpened: false, paid: false,
        createdAt: serverTimestamp(), createdAtText: new Date().toISOString()
      };
    }

    async function sendKitchen(){
      if(!cart.length) return toast('السلة فارغة', 'err');
      if(!$('tableInput').value.trim() && !confirm('لم يتم إدخال رقم طاولة. هل تريد إرسال الطلب كطلب خارجي؟')) return;
      try{
        await addDoc(col('orders'), orderPayload(tableNo ? 'table' : 'menu'));
        cart = []; saveCart(); closeCart(); toast('تم إرسال الطلب للمطبخ بنجاح', 'ok');
      }catch(err){ toast(firebaseErrorMessage(err), 'err'); }
    }

    async function sendWhatsapp(){
      if(!cart.length) return toast('السلة فارغة', 'err');
      const payload = orderPayload('whatsapp');
      try{ await addDoc(col('orders'), payload); }catch(err){ toast(firebaseErrorMessage(err), 'err'); }
      const lines = [`طلب جديد ${payload.no}`, payload.table ? `الطاولة: ${payload.table}` : 'طلب خارج المطعم', ...payload.items.map(i=>`- ${i.name} × ${i.qty} = ${money(i.price*i.qty, payload.currency)}`), `الإجمالي: ${money(payload.total, payload.currency)}`, payload.note ? `ملاحظات: ${payload.note}` : ''].filter(Boolean);
      const phone = String(settings.whatsapp || '').replace(/\D/g,'');
      if(!phone) return toast('ضع رقم واتساب المطعم من الإعدادات أولاً', 'err');
      window.open(`https://wa.me/${phone}?text=${encodeURIComponent(lines.join('\n'))}`, '_blank');
      cart = []; saveCart(); closeCart();
    }

    async function loadOnceFallback(){
      try{
        const s = await getDoc(refDoc('settings','main')); if(s.exists()) settings = {...settings, ...s.data()};
        const cs = await getDocs(col('categories')); if(!cs.empty) categories = snapshotList(cs);
        const ps = await getDocs(col('products')); if(!ps.empty) products = snapshotList(ps);
        showFirebaseWarning('');
      }catch(err){
        showFirebaseWarning(firebaseErrorMessage(err) + ' سيتم عرض منيو تجريبي مؤقت حتى يتم إصلاح القواعد.');
      }
      updateHeader(); renderCategories(); renderProducts(); renderCartBadge();
    }

    function subscribe(){
      unsubscribers.forEach(u => { try{u()}catch{} }); unsubscribers=[];
      try{
        unsubscribers.push(onSnapshot(refDoc('settings','main'), snap => { if(snap.exists()) settings = {...settings, ...snap.data()}; updateHeader(); renderProducts(); }, err => showFirebaseWarning(firebaseErrorMessage(err))));
        unsubscribers.push(onSnapshot(col('categories'), snap => { if(!snap.empty) categories = snapshotList(snap); renderCategories(); renderProducts(); }, err => showFirebaseWarning(firebaseErrorMessage(err))));
        unsubscribers.push(onSnapshot(col('products'), snap => { if(!snap.empty) products = snapshotList(snap); renderProducts(); }, err => showFirebaseWarning(firebaseErrorMessage(err))));
      }catch(err){ showFirebaseWarning(firebaseErrorMessage(err)); }
    }

    $('searchInput').oninput = renderProducts;
    $('cartBtnTop').onclick = openCart; $('cartBtnBottom').onclick = openCart; $('closeCart').onclick = closeCart;
    $('cartModal').onclick = e => { if(e.target.id === 'cartModal') closeCart(); };
    $('sendKitchen').onclick = sendKitchen; $('sendWhatsapp').onclick = sendWhatsapp;
    $('refreshBtn').onclick = () => { loadOnceFallback(); subscribe(); toast('تم التحديث', 'ok'); };

    await loadOnceFallback();
    subscribe();
  </script>
</body>
</html>
