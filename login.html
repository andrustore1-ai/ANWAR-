<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل دخول الإدارة - R7 Burger</title>
  <style>
    :root{--brand:#ea580c;--brand2:#fb923c;--dark:#101827;--muted:#6b7280;--line:#eef0f4;--bg:#f6f7fb;--bad:#dc2626;--ok:#16a34a;--shadow:0 18px 45px rgba(15,23,42,.08)}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;background:linear-gradient(145deg,#fff7ed,#f8fafc);color:var(--dark);font-family:Tahoma,Arial,sans-serif;display:grid;place-items:center;padding:18px} button,input{font:inherit}.card{width:min(440px,100%);background:#fff;border:1px solid var(--line);border-radius:36px;padding:28px;box-shadow:var(--shadow)}.logo{width:74px;height:74px;border-radius:24px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;display:grid;place-items:center;font-weight:900;font-size:28px;margin:0 auto 18px}.title{text-align:center;margin:0;font-size:28px;font-weight:900}.sub{text-align:center;color:var(--muted);line-height:1.8;font-weight:700;margin:10px 0 24px}.field{width:100%;border:1px solid var(--line);background:#f8fafc;border-radius:22px;padding:17px;margin:8px 0 14px;outline:none;text-align:center;font-size:20px;font-weight:900;letter-spacing:2px}.primary{width:100%;border:0;border-radius:22px;padding:17px;background:var(--brand);color:#fff;font-weight:900;box-shadow:0 10px 25px rgba(234,88,12,.25);cursor:pointer}.primary:disabled{opacity:.65;cursor:not-allowed}.msg{display:none;margin-top:14px;padding:14px;border-radius:18px;line-height:1.8;font-weight:800}.msg.err{display:block;background:#fee2e2;color:#991b1b}.msg.ok{display:block;background:#dcfce7;color:#166534}.hint{background:#fff7ed;color:#7c2d12;border:1px solid #fed7aa;border-radius:20px;padding:14px;line-height:1.8;font-size:13px;font-weight:800;margin-top:16px}.links{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap}.links a{color:var(--brand);text-decoration:none;font-weight:900}.spin{display:inline-block;width:18px;height:18px;border:3px solid #fed7aa;border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;vertical-align:middle;margin-left:8px}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">R7</div>
    <h1 class="title">دخول الإدارة</h1>
    <p class="sub">اكتب مفتاح الدخول. المفتاح الافتراضي يعمل مباشرة: <b>0000</b></p>
    <input id="keyInput" class="field" placeholder="0000" autocomplete="off" autofocus />
    <button id="loginBtn" class="primary">دخول</button>
    <div id="msg" class="msg"></div>
    <div class="hint">تم حذف Firebase Auth نهائياً من هذه النسخة، لذلك لن يظهر خطأ <b>auth/admin-restricted-operation</b>. بعد الدخول أنشئ مفتاحاً جديداً من الإعدادات ولا تعتمد على 0000 دائماً.</div>
    <div class="links"><a href="index.html">فتح المنيو</a><a href="firebase-check.html">فحص Firebase</a></div>
  </main>

  <script type="module">
    import { validateAdminKey, firebaseErrorMessage, sessionIsValid } from './firebase.js';
    const $ = id => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    const next = params.get('next') || 'admin.html';
    if(sessionIsValid()) location.href = next;
    function show(msg, cls='err'){ $('msg').className = 'msg ' + cls; $('msg').textContent = msg; }
    async function login(){
      const key = $('keyInput').value.trim();
      $('loginBtn').disabled = true; $('loginBtn').innerHTML = '<span class="spin"></span> جاري الدخول';
      try{
        await validateAdminKey(key);
        show('تم تسجيل الدخول بنجاح', 'ok');
        setTimeout(()=> location.href = next, 350);
      }catch(err){ show(firebaseErrorMessage(err)); }
      finally{ $('loginBtn').disabled = false; $('loginBtn').textContent = 'دخول'; }
    }
    $('loginBtn').onclick = login;
    $('keyInput').onkeydown = e => { if(e.key === 'Enter') login(); };
  </script>
</body>
</html>
